<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跑酷游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .game-wrapper {
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            margin-bottom: 10px;
        }

        .game-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .score-container {
            display: flex;
            gap: 30px;
        }

        .score-item {
            text-align: center;
        }

        .score-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .score-value.high {
            color: #f39c12;
        }

        canvas {
            display: block;
            border-radius: 10px;
            background: #87CEEB;
            cursor: pointer;
        }

        .game-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-start {
            background: #2ecc71;
            color: white;
        }

        .btn-restart {
            background: #e74c3c;
            color: white;
        }

        .btn-pause {
            background: #f39c12;
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .controls-hint {
            text-align: center;
            margin-top: 10px;
            color: #999;
            font-size: 14px;
        }

        .controls-hint kbd {
            background: #f0f0f0;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid #ddd;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-header">
            <div class="game-title">🏃 跑酷游戏</div>
            <div class="score-container">
                <div class="score-item">
                    <div class="score-label">得分</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">最高分</div>
                    <div class="score-value high" id="highScore">0</div>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div class="game-controls">
            <button class="btn btn-start" id="startBtn">开始游戏</button>
            <button class="btn btn-pause" id="pauseBtn" disabled>暂停</button>
            <button class="btn btn-restart" id="restartBtn">重新开始</button>
        </div>

        <div class="controls-hint">
            按 <kbd>空格</kbd> 或 <kbd>↑</kbd> 或 <kbd>点击</kbd> 屏幕跳跃
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const restartBtn = document.getElementById('restartBtn');

        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 400;
        const GROUND_Y = 350;
        const GRAVITY = 0.6;
        const JUMP_FORCE = -12;
        const PLAYER_WIDTH = 30;
        const PLAYER_HEIGHT = 40;
        const OBSTACLE_WIDTH = 25;
        const MIN_OBSTACLE_HEIGHT = 30;
        const MAX_OBSTACLE_HEIGHT = 60;
        const BASE_SPEED = 5;
        const MAX_SPEED = 12;
        const SPEED_INCREMENT = 0.002;
        const OBSTACLE_INTERVAL = 80;
        const MIN_OBSTACLE_GAP = 150;

        let gameState = 'idle';
        let score = 0;
        let highScore = parseInt(localStorage.getItem('parkourHighScore')) || 0;
        let speed = BASE_SPEED;
        let frameCount = 0;
        let obstacles = [];
        let clouds = [];
        let groundOffset = 0;

        highScoreElement.textContent = highScore;

        const player = {
            x: 100,
            y: GROUND_Y - PLAYER_HEIGHT,
            width: PLAYER_WIDTH,
            height: PLAYER_HEIGHT,
            vy: 0,
            isJumping: false,
            color: '#e74c3c'
        };

        function initClouds() {
            clouds = [];
            for (let i = 0; i < 5; i++) {
                clouds.push({
                    x: Math.random() * GAME_WIDTH,
                    y: Math.random() * 150 + 20,
                    width: Math.random() * 80 + 40,
                    speed: Math.random() * 0.5 + 0.2
                });
            }
        }

        function resetGame() {
            player.y = GROUND_Y - PLAYER_HEIGHT;
            player.vy = 0;
            player.isJumping = false;
            obstacles = [];
            score = 0;
            speed = BASE_SPEED;
            frameCount = 0;
            scoreElement.textContent = '0';
            gameState = 'idle';
            startBtn.textContent = '开始游戏';
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            pauseBtn.textContent = '暂停';
            initClouds();
        }

        function jump() {
            if (gameState !== 'playing' && gameState !== 'paused') return;
            if (player.isJumping) return;
            player.vy = JUMP_FORCE;
            player.isJumping = true;
        }

        function spawnObstacle() {
            const height = Math.random() * (MAX_OBSTACLE_HEIGHT - MIN_OBSTACLE_HEIGHT) + MIN_OBSTACLE_HEIGHT;
            obstacles.push({
                x: GAME_WIDTH,
                y: GROUND_Y - height,
                width: OBSTACLE_WIDTH,
                height: height,
                color: `hsl(${Math.random() * 60 + 200}, 70%, 50%)`
            });
        }

        function update() {
            if (gameState !== 'playing') return;

            frameCount++;

            speed = Math.min(BASE_SPEED + frameCount * SPEED_INCREMENT, MAX_SPEED);

            player.vy += GRAVITY;
            player.y += player.vy;

            if (player.y >= GROUND_Y - PLAYER_HEIGHT) {
                player.y = GROUND_Y - PLAYER_HEIGHT;
                player.vy = 0;
                player.isJumping = false;
            }

            groundOffset = (groundOffset + speed) % 20;

            clouds.forEach(cloud => {
                cloud.x -= cloud.speed;
                if (cloud.x + cloud.width < 0) {
                    cloud.x = GAME_WIDTH;
                    cloud.y = Math.random() * 150 + 20;
                }
            });

            if (frameCount % Math.max(OBSTACLE_INTERVAL - Math.floor(speed * 3), 35) === 0) {
                let canSpawn = true;
                if (obstacles.length > 0) {
                    const lastObstacle = obstacles[obstacles.length - 1];
                    if (GAME_WIDTH - lastObstacle.x < MIN_OBSTACLE_GAP) {
                        canSpawn = false;
                    }
                }
                if (canSpawn) {
                    spawnObstacle();
                }
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= speed;

                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreElement.textContent = score;
                    continue;
                }

                if (checkCollision(player, obstacles[i])) {
                    gameOver();
                    return;
                }
            }
        }

        function checkCollision(player, obstacle) {
            const playerLeft = player.x;
            const playerRight = player.x + player.width;
            const playerTop = player.y;
            const playerBottom = player.y + player.height;

            const obstacleLeft = obstacle.x;
            const obstacleRight = obstacle.x + obstacle.width;
            const obstacleTop = obstacle.y;
            const obstacleBottom = obstacle.y + obstacle.height;

            return playerLeft < obstacleRight &&
                playerRight > obstacleLeft &&
                playerTop < obstacleBottom &&
                playerBottom > obstacleTop;
        }

        function gameOver() {
            gameState = 'gameover';
            if (score > highScore) {
                highScore = score;
                highScoreElement.textContent = highScore;
                localStorage.setItem('parkourHighScore', highScore);
            }
            startBtn.textContent = '重新开始';
            startBtn.disabled = false;
            pauseBtn.disabled = true;
        }

        function draw() {
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            const skyGradient = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
            skyGradient.addColorStop(0, '#87CEEB');
            skyGradient.addColorStop(1, '#E0F7FA');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            clouds.forEach(cloud => {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath();
                ctx.ellipse(cloud.x, cloud.y, cloud.width / 2, 20, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cloud.x - cloud.width / 4, cloud.y + 5, cloud.width / 3, 15, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(cloud.x + cloud.width / 4, cloud.y + 5, cloud.width / 3, 15, 0, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, GROUND_Y, GAME_WIDTH, 5);

            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, GROUND_Y + 5, GAME_WIDTH, GAME_HEIGHT - GROUND_Y - 5);

            for (let i = 0; i < GAME_WIDTH / 20 + 1; i++) {
                const x = i * 20 - groundOffset;
                ctx.fillStyle = '#1a6b1a';
                ctx.fillRect(x, GROUND_Y + 5, 2, 5);
            }

            obstacles.forEach(obstacle => {
                const gradient = ctx.createLinearGradient(obstacle.x, obstacle.y, obstacle.x + obstacle.width, obstacle.y);
                gradient.addColorStop(0, obstacle.color);
                gradient.addColorStop(1, '#2c3e50');
                ctx.fillStyle = gradient;
                ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);

                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(obstacle.x - 3, obstacle.y + obstacle.height - 10, obstacle.width + 6, 10);

                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(obstacle.x + 5, obstacle.y + 5, 5, obstacle.height - 15);
            });

            const playerGradient = ctx.createLinearGradient(player.x, player.y, player.x + player.width, player.y + player.height);
            playerGradient.addColorStop(0, '#e74c3c');
            playerGradient.addColorStop(1, '#c0392b');
            ctx.fillStyle = playerGradient;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x + 5, player.y + 8, 6, 6);
            ctx.fillRect(player.x + 19, player.y + 8, 6, 6);

            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x + 3, player.y + 20, 8, 12);
            ctx.fillRect(player.x + 19, player.y + 20, 8, 12);

            if (gameState === 'idle') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                ctx.fillStyle = '#fff';
                ctx.font = '36px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('🏃 跑酷游戏', GAME_WIDTH / 2, GAME_HEIGHT / 2 - 20);
                ctx.font = '18px Arial';
                ctx.fillText('点击"开始游戏"或按空格键开始', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 30);
            }

            if (gameState === 'gameover') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                ctx.fillStyle = '#e74c3c';
                ctx.font = '48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('游戏结束', GAME_WIDTH / 2, GAME_HEIGHT / 2 - 30);
                ctx.fillStyle = '#fff';
                ctx.font = '24px Arial';
                ctx.fillText(`得分: ${score}`, GAME_WIDTH / 2, GAME_HEIGHT / 2 + 20);
                if (score >= highScore && score > 0) {
                    ctx.fillStyle = '#f39c12';
                    ctx.font = '20px Arial';
                    ctx.fillText('🎉 新纪录！', GAME_WIDTH / 2, GAME_HEIGHT / 2 + 60);
                }
            }

            if (gameState === 'paused') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
                ctx.fillStyle = '#fff';
                ctx.font = '36px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('⏸ 已暂停', GAME_WIDTH / 2, GAME_HEIGHT / 2);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            if (gameState === 'gameover') {
                resetGame();
            }
            if (gameState === 'idle' || gameState === 'paused') {
                gameState = 'playing';
                startBtn.textContent = '游戏中...';
                startBtn.disabled = true;
                pauseBtn.disabled = false;
                pauseBtn.textContent = '暂停';
            }
        }

        function togglePause() {
            if (gameState === 'playing') {
                gameState = 'paused';
                pauseBtn.textContent = '继续';
                startBtn.disabled = false;
                startBtn.textContent = '继续';
            } else if (gameState === 'paused') {
                gameState = 'playing';
                pauseBtn.textContent = '暂停';
                startBtn.disabled = true;
                startBtn.textContent = '游戏中...';
            }
        }

        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', togglePause);
        restartBtn.addEventListener('click', function() {
            resetGame();
            if (gameState === 'gameover' || gameState === 'playing' || gameState === 'paused') {
                gameState = 'playing';
                startBtn.textContent = '游戏中...';
                startBtn.disabled = true;
                pauseBtn.disabled = false;
                pauseBtn.textContent = '暂停';
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                if (gameState === 'idle' || gameState === 'paused') {
                    startGame();
                } else {
                    jump();
                }
            }
            if (e.code === 'KeyP') {
                togglePause();
            }
        });

        canvas.addEventListener('click', function() {
            if (gameState === 'idle' || gameState === 'paused') {
                startGame();
            } else {
                jump();
            }
        });

        initClouds();
        gameLoop();
    </script>
</body>
</html>
